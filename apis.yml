aid: tsinghua
name: Tsinghua University
description: >-
  Tsinghua University is a leading public research university in Beijing, China,
  ranked #23 in the QS World University Rankings 2025. Like most Chinese
  universities, Tsinghua does not operate a centralized public developer portal
  or documented institutional API program; its student, course, and library
  systems sit behind campus SSO and are not publicly documented. The most
  notable public, programmatically accessible service is the TUNA open-source
  mirror (mirrors.tuna.tsinghua.edu.cn), run by the student TUNA association,
  which exposes machine-readable JSON status endpoints. A number of Tsinghua
  research labs (THUNLP, THUML, TUNA, Tsinghua Database Group) maintain active
  open-source code on GitHub, but these are project repositories rather than an
  institution-wide API platform.
