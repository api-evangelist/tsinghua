    name: TUNA Mirror Sync Status API
    description: >-
      Public JSON endpoint published by the Tsinghua University TUNA open-source
      mirror site exposing the synchronization status of hundreds of mirrored
      repositories (Debian, Ubuntu, PyPI, CTAN, etc.). Each entry includes name,
      status, upstream, size, and last_update timestamps. Used to drive the
      mirror status dashboard; no authentication required.
