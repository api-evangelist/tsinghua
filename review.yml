  - date: '2026-06-03'
    rating: 2
    summary: >-
      No centralized public developer portal or documented institution-wide API
      program was found for Tsinghua University; student, course, and library
      systems are gated behind campus SSO and are not publicly documented. The
      one clearly public, machine-readable service verified live is the
      student-run TUNA open-source mirror, whose tunasync.json status endpoint
      returns valid JSON (HTTP 200). The official website, library site, mirror
      site, and TUNA GitHub org all resolve. LinkedIn returns HTTP 999 (anti-bot
      challenge) but the page exists. Research-lab GitHub orgs (THUNLP, THUML,
      Tsinghua Database Group) host open-source code but are not catalogued here
      as institutional APIs. No endpoints were fabricated.
    endpoints:
